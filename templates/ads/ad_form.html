{% extends 'base.html' %}

{% block content %}

<div class="form-wrapper" style="margin-top: 170px;">

    <h1 class="form-title">
        Объявление
    </h1>

    <form method="post" enctype="multipart/form-data">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn" style="margin-top: 20px;">
            Сохранить
        </button>

    </form>

</div>

{% endblock %}
